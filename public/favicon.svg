<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Den gyllene sfär-gradienten baserad på din existerande färgpalett -->
    <radialGradient id="sphereGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd466" />
      <stop offset="40%" stop-color="#f5b731" />
      <stop offset="100%" stop-color="#c88c0b" />
    </radialGradient>
    
    <!-- Subtil yttre skugga för att lyfta ikonen -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8" />
      <feOffset dx="0" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Inre glöd för mer 3D-djup -->
    <filter id="innerGlow">
      <feFlood flood-color="white" flood-opacity="0.4" result="glowColor" />
      <feComposite in="glowColor" in2="SourceGraphic" operator="in" result="maskedGlow" />
      <feGaussianBlur in="maskedGlow" stdDeviation="1" result="blurredGlow" />
      <feOffset dx="0" dy="1" />
      <feComposite in2="SourceGraphic" operator="over" />
    </filter>
  </defs>

  <!-- Själva sfären -->
  <circle cx="16" cy="16" r="14" fill="url(#sphereGrad)" filter="url(#shadow)" />
  
  <!-- En extra högdager för att förstärka sfär-känslan -->
  <ellipse cx="11" cy="11" rx="5" ry="3" fill="white" fill-opacity="0.25" transform="rotate(-30 11 11)" />

  <!-- Frågetecknet i en tidlös serif-stil -->
  <text 
    x="16.5" 
    y="17.5" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    font-family="Georgia, 'Fraunces', serif" 
    font-weight="900" 
    font-size="19" 
    fill="white"
    style="text-shadow: 0 1px 2px rgba(0,0,0,0.3);"
  >?</text>
</svg>
