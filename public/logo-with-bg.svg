<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" id="vilket-ar-svg">
  <defs>
    <!-- Import Outfit font from Google Fonts for premium typography -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      
      .bg-rect {
        fill: url(#bgGradient);
        rx: 110px;
        ry: 110px;
      }
      
      .text-vilket {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        font-size: 116px;
        letter-spacing: -2px;
        dominant-baseline: alphabetic;
      }
      
      .text-ar {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        fill: url(#goldGradient);
        font-size: 148px;
        letter-spacing: -1px;
        dominant-baseline: alphabetic;
      }

      .orbit-line {
        fill: none;
        stroke: url(#orbitGradient);
        stroke-width: 3.5px;
      }

      .star-sparkle {
        fill: url(#goldGradient);
      }

      .planet-solid {
        fill: url(#goldGradient);
      }

      .planet-ring-outer {
        fill: none;
        stroke: url(#goldGradient);
        stroke-width: 3px;
      }

      .planet-ring-inner {
        fill: url(#goldGradient);
      }

      .custom-a-ring {
        fill: none;
        stroke: url(#goldGradient);
        stroke-width: 5px;
      }
    </style>

    <!-- Radial gradient for a deep, premium matte dark background -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#222428" />
      <stop offset="100%" stop-color="#090a0b" />
    </radialGradient>

    <!-- Metallic Gold Linear Gradient for letters, star, and planets -->
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#df9a16" />
      <stop offset="35%" stop-color="#f8c63b" />
      <stop offset="70%" stop-color="#fdf098" />
      <stop offset="100%" stop-color="#f4bd32" />
    </linearGradient>

    <!-- Fading Gold Gradient for the Orbit Ring (strong on left, fades out on right) -->
    <linearGradient id="orbitGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f7c43a" stop-opacity="1" />
      <stop offset="40%" stop-color="#df9a16" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#9e6907" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#5a3b00" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background App-Icon squircle -->
  <rect id="background" class="bg-rect" width="512" height="512" x="0" y="0" />

  <!-- Orbit Ring System -->
  <g id="orbit-system">
    <!-- Main Orbit Circle (centered slightly to the left to wrap the text) -->
    <circle id="orbit-ring" class="orbit-line" cx="240" cy="260" r="172" />

    <!-- Planet 1: Top-Left (Solid Small)
         Angle: ~200 degrees on the circle.
         cx = 240 + 172 * cos(200°) = 240 - 161.6 = 78.4
         cy = 260 + 172 * sin(200°) = 260 - 58.8 = 201.2
    -->
    <circle id="planet-top" class="planet-solid" cx="78.4" cy="201.2" r="7.5" />

    <!-- Planet 2: Center-Left (Double Ringed Planet)
         Angle: 180 degrees (direct left)
         cx = 240 - 172 = 68
         cy = 260
    -->
    <g id="planet-middle">
      <circle class="planet-ring-outer" cx="68" cy="260" r="17.5" />
      <circle class="planet-ring-inner" cx="68" cy="260" r="7.5" />
    </g>

    <!-- Planet 3: Bottom-Left (Solid Small)
         Angle: ~160 degrees on the circle.
         cx = 240 + 172 * cos(160°) = 240 - 161.6 = 78.4
         cy = 260 + 172 * sin(160°) = 260 + 58.8 = 318.8
    -->
    <circle id="planet-bottom" class="planet-solid" cx="78.4" cy="318.8" r="7.5" />
  </g>

  <!-- Sparkle Star (Four-Pointed) in the Upper Right -->
  <g id="star-sparkle-group">
    <!-- Center of star: cx=395, cy=135. Half-width = 23px -->
    <path id="star" class="star-sparkle" d="M 395,112 Q 395,135 418,135 Q 395,135 395,158 Q 395,135 372,135 Q 395,135 395,112 Z" />
  </g>

  <!-- Text elements -->
  <g id="text-group">
    <!-- Line 1: "Vilket" (Pure White) -->
    <text id="text-vilket" class="text-vilket" x="128" y="264">Vilket</text>

    <!-- Line 2: "År" (Without the diacritic ring, written as 'Ar') -->
    <text id="text-ar" class="text-ar" x="228" y="398">Ar</text>

    <!-- Custom Stylized Ring for the "Å"
         Perfect hollow golden ring centered exactly above the 'A'
         Apex of 'A' is at x ~ 276. We place the ring right above it at y = 280.
    -->
    <circle id="custom-a-ring" class="custom-a-ring" cx="277" cy="278" r="12" />
  </g>
</svg>
